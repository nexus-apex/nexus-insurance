{% extends "base.html" %}
{% block title %}{% if editing %}Edit{% else %}New{% endif %} Policy | NexusInsurance{% endblock %}
{% block page_title %}{% if editing %}Edit Policy{% else %}New Policy{% endif %}{% endblock %}
{% block content %}
<div class="card" style="max-width:750px">
  <form method="post">
    {% csrf_token %}
    <div class="form-row">
      <div class="form-group">
        <label>Policy Number</label>
        <input type="text" name="policy_number" value="{{ record.policy_number|default:'' }}">
      </div>
      <div class="form-group">
        <label>Holder Name</label>
        <input type="text" name="holder_name" value="{{ record.holder_name|default:'' }}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Policy Type</label>
        <select name="policy_type">
          <option value="life" {% if record.policy_type == 'life' %}selected{% endif %}>Life</option>
          <option value="health" {% if record.policy_type == 'health' %}selected{% endif %}>Health</option>
          <option value="motor" {% if record.policy_type == 'motor' %}selected{% endif %}>Motor</option>
          <option value="property" {% if record.policy_type == 'property' %}selected{% endif %}>Property</option>
          <option value="travel" {% if record.policy_type == 'travel' %}selected{% endif %}>Travel</option>
        </select>
      </div>
      <div class="form-group">
        <label>Premium</label>
        <input type="number" step="0.01" name="premium" value="{{ record.premium|default:'0' }}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Coverage</label>
        <input type="number" step="0.01" name="coverage" value="{{ record.coverage|default:'0' }}">
      </div>
      <div class="form-group">
        <label>Start Date</label>
        <input type="date" name="start_date" value="{{ record.start_date|date:'Y-m-d'|default:'' }}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>End Date</label>
        <input type="date" name="end_date" value="{{ record.end_date|date:'Y-m-d'|default:'' }}">
      </div>
      <div class="form-group">
        <label>Status</label>
        <select name="status">
          <option value="active" {% if record.status == 'active' %}selected{% endif %}>Active</option>
          <option value="expired" {% if record.status == 'expired' %}selected{% endif %}>Expired</option>
          <option value="cancelled" {% if record.status == 'cancelled' %}selected{% endif %}>Cancelled</option>
          <option value="claimed" {% if record.status == 'claimed' %}selected{% endif %}>Claimed</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Agent</label>
        <input type="text" name="agent" value="{{ record.agent|default:'' }}">
      </div>
    </div>

    <div style="display:flex;gap:0.75rem;margin-top:1rem">
      <button type="submit" class="btn btn-primary">{% if editing %}Update{% else %}Create{% endif %} Policy</button>
      <a href="/policies/" class="btn" style="background:var(--border);color:var(--text)">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
